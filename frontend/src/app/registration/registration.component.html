<form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
  <div class="row">
    <div class="col_8">
      <h3 class="form__header">Welcome home</h3>
      <div class="form__field-note">Create a new account</div>
      <div class="form__row">
        <tui-input formControlName="username">
          Login
          <input autocomplete="on" tuiTextfield/>
        </tui-input>
        <tui-error formControlName="username" [error]="[] | tuiFieldError | async"></tui-error>
      </div>
      <div class="form__row">
        <tui-input formControlName="email">
          Email
          <input autocomplete="on" tuiTextfield/>
        </tui-input>
        <tui-error formControlName="email" [error]="[] | tuiFieldError | async"></tui-error>
      </div>
      <div class="form__row">
        <div class="form__multi-field">
          <tui-input-password formControlName="password">
            Password
            <input autocomplete="on" tuiTextfield/>
          </tui-input-password>
          <tui-error formControlName="password" [error]="[] | tuiFieldError | async"></tui-error>
        </div>
      </div>
      <div class="form__row">
        <div class="form__multi-field">
          <tui-input-password formControlName="confirmPassword">
            Confirm password
            <input autocomplete="on" tuiTextfield/>
          </tui-input-password>
          <tui-error formControlName="confirmPassword" [error]="[] | tuiFieldError | async"></tui-error>
        </div>
      </div>
      <div class="form__buttons">
        <button size="l" tuiButton type="submit" [disabled]="!registerForm.valid" class="form__button">Sign Up</button>
      </div>
      <div class="login">Already have an account? <a class="link" routerLink="/auth/login">Sign in</a></div>
    </div>
  </div>
</form>
